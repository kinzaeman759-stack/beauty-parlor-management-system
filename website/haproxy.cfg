Add
# =============================
# GLOBAL SETTINGS
# =============================
global
    log stdout format raw local0
    daemon
    maxconn 2000

defaults
    log global
    mode http
    option httplog
    timeout connect 10s
    timeout client 60s
    timeout server 60s

# =============================
# FRONTEND - WEB
# =============================
frontend fe_web
    bind *:80
    default_backend apache2_srv

# =============================
# FRONTEND - DATABASE (MySQL TCP)
# =============================
frontend fe_mysql
    bind *:3306
    mode tcp
    option tcplog
    # Simple read/write split for SELECT queries
    acl read_query payload(0,6) -i -m sub "SELECT"
    use_backend mysql_slave if read_query
    default_backend mysql_master

# =============================
# BACKEND - MASTER (Writes)
# =============================
backend mysql_master
    mode tcp
    option tcp-check
    # Net2 IPs
    server master_db_net2 192.168.20.10:3306 check inter 2s fall 2 rise 3
    server slave_backup_net2 192.168.20.11:3306 check backup
    # Net1 IPs
    server master_db_net1 192.168.10.10:3306 check inter 2s fall 2 rise 3
    server slave_backup_net1 192.168.10.11:3306 check backup

# =============================
# BACKEND - SLAVE (Reads)
# =============================
backend mysql_slave
    mode tcp
    balance roundrobin
    option tcp-check
    server slave1 192.168.20.11:3306 check inter 2s fall 2 rise 3

# =============================
# BACKEND - APACHE WEB SERVER
# =============================
backend apache2_srv
    mode http
    balance roundrobin
    server web1 192.168.10.20:80 check inter 2s fall 2 rise 3
    server web2 192.168.20.20:80 check inter 2s fall 2 rise 3






